name: modern_notes
description: "Modern AI Notes - Flutter Conversion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Database (Local SQLite via Drift)
  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.0
  drift_flutter: ^0.1.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  google_sign_in: ^6.2.1

  # AI / Groq (Llama 3)
  http: ^1.2.1

  # Local Storage
  shared_preferences: ^2.3.0

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Background Tasks
  workmanager: ^0.5.2

  # Biometric
  local_auth: ^2.3.0

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.0
  record: ^5.1.0
  audioplayers: ^6.1.0

dependency_overrides:
  record_platform_interface: 1.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.19.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#4A5AF0"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/